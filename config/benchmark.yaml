catalog_path: resources/fire_catalog.json
model_path: models/stt_ru_conformer_ctc_large.nemo
device: cpu
output_dir: data/fire_catalog_benchmark
corpus_version: "2026-07-13"
sample_rate: 48000
dev_speakers: [aidar, baya]
test_speakers: [kseniya, xenia]
